            href: lecciones/ejercicio-04.qmd
          - text: "Ejercicio 5"
            href: lecciones/ejercicio-05.qmd
          - text: "Ejercicio 6"
            href: lecciones/ejercicio-06.qmd
          - text: "Ejercicio 7"
            href: lecciones/ejercicio-07.qmd
          - text: "Ejercicio 8"
            href: lecciones/ejercicio-08.qmd
          - text: "Ejercicio 9"
            href: lecciones/ejercicio-09.qmd
