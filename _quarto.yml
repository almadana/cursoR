format:
  html:
    theme:
      - cosmo
      - styles/custom.scss
    lang: es
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true

execute:
  freeze: auto
  dir: project

lang: es
