project:
  type: website
  output-dir: docs
  preview:
    port: 4242
    browser: false
  # Solo el material del curso (no entregas de alumnos ni otros .qmd sueltos)
  render:
    - index.qmd
    - lecciones/*.qmd

website:
  title: "Curso de R"
  description: "Programación y estadística en R — Facultad de Psicología"
  site-url: https://almadana.github.io/cursoR/  # ajustar al repo de GitHub Pages
  repo-url: https://github.com/almadana/cursoR
  repo-actions: [edit, issue]
  navbar:
    left:
      - href: index.qmd
        text: Inicio
      - text: Lecciones
        menu:
          - text: "1 · Variables e indexación"
            href: lecciones/01-sesion-variables-indexacion.qmd
          - text: "2 · Funciones"
            href: lecciones/02-sesion-funciones.qmd
          - text: "3 · Importación y directorios"
            href: lecciones/03-sesion-importacion-directorios.qmd
          - text: "4 · dplyr"
            href: lecciones/04-sesion-dplyr.qmd
          - text: "5 · tidyselect"
            href: lecciones/05-sesion-tidyselect.qmd
          - text: "6 · pivot"
            href: lecciones/06-sesion-pivot.qmd
          - text: "7 · ggplot2"
            href: lecciones/07-sesion-ggplot2.qmd
          - text: "8 · Modelos lineales I"
            href: lecciones/08-sesion-modelos-lineales-1.qmd
          - text: "9 · Medias marginales"
            href: lecciones/09-sesion-medias-marginales.qmd
      - text: Ejercicios
