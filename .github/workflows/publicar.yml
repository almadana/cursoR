# Publica el sitio Quarto en GitHub Pages (rama gh-pages).
#
# Configuración en GitHub: Settings → Pages → Source: Deploy from branch
#   Branch: gh-pages   Folder: / (root)
# NO usar "main /docs" — Jekyll rompe el HTML de Quarto.

name: Publicar sitio Quarto

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Instalar paquetes R del curso
        run: |
          install.packages(c(
            "knitr", "rmarkdown", "tidyverse", "ggplot2",
            "lme4", "lmerTest", "emmeans", "multcomp",
            "broom", "car", "psych", "haven", "readxl"
          ), repos = "https://cloud.r-project.org")

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render sitio
        run: quarto render

      - name: Desactivar Jekyll en la salida
        run: touch docs/.nojekyll

      - name: Desplegar a GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.event_name == 'push'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs
          publish_branch: gh-pages
